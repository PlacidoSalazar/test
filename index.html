<!DOCTYPE html>
<html lang="en" style="background:#000;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio Presentation</title>

  <!-- 🔥 Fuerza negro inmediato -->
  <meta name="color-scheme" content="dark" />

  <style>
    html, body {
      background: #000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      opacity: 0;
    }

    .ready body {
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    .container {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>

  <!-- ⚡️ Esto corre ANTES de pintar -->
  <script>
    document.documentElement.classList.add("ready");
  </script>

</head>

<body>
  <div class="container">
    <iframe
      src="https://www.figma.com/embed?embed_host=share&url=https://www.figma.com/proto/t6F5vDScr8wAnWkF6cxf85/Folio-present?node-id=1-5&p=f&viewport=492%2C661%2C0.03&t=FnKKB5d6ohkpEADT-1&scaling=contain&content-scaling=fixed&page-id=0%3A1"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
