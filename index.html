<!DOCTYPE html>
<html lang="en" style="background:#000;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Folio Presentation</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;

      /* 👇 clave */
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    iframe.loaded {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <iframe
      id="figma"
      src="https://embed.figma.com/proto/t6F5vDScr8wAnWkF6cxf85/Folio-present?node-id=1-5&p=f&viewport=492%2C661%2C0.03&scaling=contain&content-scaling=fixed&page-id=0%3A1&embed-host=share"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const iframe = document.getElementById("figma");

    // 👇 cuando el iframe está listo → aparece
    iframe.addEventListener("load", () => {
      iframe.classList.add("loaded");
    });
  </script>
</body>
</html>
