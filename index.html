<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio Presentation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    .screen {
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .intro {
      text-align: center;
    }

    h1 {
      font-size: 40px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .loaded iframe {
      display: block;
    }

    .loaded .intro {
      display: none;
    }
  </style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="intro">
      <h1>Portfolio presentation</h1>
      <button id="openBtn">Open presentation</button>
    </div>

    <iframe
      id="figmaFrame"
      src=""
      allowfullscreen>
    </iframe>
  </div>

  <script>
    const btn = document.getElementById("openBtn");
    const screen = document.getElementById("screen");
    const iframe = document.getElementById("figmaFrame");

    btn.addEventListener("click", () => {
      iframe.src = "https://embed.figma.com/proto/t6F5vDScr8wAnWkF6cxf85/Folio-present?node-id=1-5&p=f&viewport=492%2C661%2C0.03&scaling=contain&content-scaling=fixed&page-id=0%3A1&embed-host=share";
      screen.classList.add("loaded");
    });
  </script>
</body>
</html>
